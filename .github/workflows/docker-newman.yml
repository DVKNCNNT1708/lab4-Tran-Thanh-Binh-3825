name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/camera-stream:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-camera-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/camera-stream:lab04
          # Đợi 5 giây để container ổn định hoàn toàn
          sleep 5 
          docker ps
          # Kiểm tra xem container có còn sống không
          if [ "$(docker inspect -f '{{.State.Running}}' fit4110-camera-lab04)" != "true" ]; then
            echo "Container đã bị crash!"
            docker logs fit4110-camera-lab04
            exit 1
          fi

      - name: Wait for service health
        run: |
          echo "Waiting for service to be ready..."
          # Dùng curl GET bình thường, bỏ qua method HEAD phức tạp
          for i in {1..30}; do
            # -f: fail silently on server errors (trả về lỗi nếu status code >= 400)
            if curl -f -s http://localhost:8000/health; then
              echo "Service is up and running!"
              exit 0
            fi
            echo "Waiting ($i/30)..."
            sleep 1
          done
          echo "Service timed out!"
          docker logs fit4110-camera-lab04
          exit 1

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-camera-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-camera-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/